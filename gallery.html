<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Gallery &mdash; Artemis Art Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#3D2B1F;--secondary:#96682C;--accent:#D4A574;--bg:#FDF8F3;--surface:#F5EDE4;--surface-dark:#2C1810;
}
body{font-family:'Inter',sans-serif;color:var(--primary);background:var(--bg);line-height:1.7;padding-top:72px;}
h1{font-family:'Cormorant Garamond',serif;font-weight:400;text-align:center;}

/* ===== NAVIGATION ===== */
.nav{position:fixed;top:0;left:0;right:0;height:72px;background:rgba(253,248,243,0.92);backdrop-filter:blur(12px);border-bottom:1px solid rgba(150,104,44,0.1);z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 4vw;}
.nav-logo{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:500;}
.nav-links{display:flex;align-items:center;gap:36px;list-style:none;}
.nav-links a{font-size:14px;font-weight:500;}

/* ===== GALLERY MASONRY CONTAINER ===== */
.gallery-header{padding:60px 4vw;background:var(--surface);}
.gallery-header h1{font-size:42px;margin-bottom:8px;}
.gallery-header p{text-align:center;font-size:15px;color:rgba(61,43,31,0.7);}

.gallery-section{padding:80px 4vw;max-width:1200px;margin:0 auto;}
.gallery-grid{display:columns;columns:3;column-gap:24px;}
.gallery-item{break-inside:avoid;margin-bottom:24px;position:relative;overflow:hidden;border-radius:8px;box-shadow:0 4px 15px rgba(44,24,16,0.05);background:var(--surface);cursor:pointer;}
.gallery-item img{width:100%;height:auto;display:block;transition:transform 0.5s ease;}
.gallery-item:hover img{transform:scale(1.04);}
.gallery-overlay{position:absolute;inset:0;background:linear-gradient(to top, rgba(44,24,16,0.8), transparent);opacity:0;transition:opacity 0.4s ease;display:flex;align-items:flex-end;padding:20px;color:var(--bg);}
.gallery-item:hover .gallery-overlay{opacity:1;}
.gallery-title{font-family:'Cormorant Garamond',serif;font-size:20px;}

/* ===== FOOTER ===== */
.footer{background:var(--surface-dark);padding:40px 4vw;color:var(--bg);text-align:center;font-size:12px;opacity:0.8;}

/* ===== ANIMATIONS ===== */
.fade-up{opacity:0;transform:translateY(30px);transition:all 0.8s ease;}
.fade-up.visible{opacity:1;transform:translateY(0);}

@media(max-width:900px){.gallery-grid{columns:2;}}
@media(max-width:600px){.gallery-grid{columns:1;}.nav-links{display:none;}}
</style>
</head>
<body>

<nav class="nav">
  <a href="artemis-art-studio.html" class="nav-logo">Artemis</a>
  <ul class="nav-links">
    <li><a href="about.html">Our Story</a></li>
    <li><a href="workshops.html">Workshops</a></li>
    <li><a href="menu.html">Menu</a></li>
    <li><a href="gallery.html">Gallery</a></li>
  </ul>
</nav>

<header class="gallery-header">
  <h1 class="fade-up">Studio Snapshots</h1>
  <p class="fade-up">A visual journal tracking moments of creation, warmth, and beautiful pours.</p>
</header>

<main class="gallery-section">
  <div class="gallery-grid">
    <div class="gallery-item fade-up">
      <img src="images/coffee-painting-workshop.jpg" alt="Artwork 1">
      <div class="gallery-overlay"><div class="gallery-title">Espresso Landscapes</div></div>
    </div>
    <div class="gallery-item fade-up">
      <img src="images/latte-art.jpg" alt="Artwork 2">
      <div class="gallery-overlay"><div class="gallery-title">Rosetta Progress</div></div>
    </div>
    <div class="gallery-item fade-up">
      <img src="images/studio-interior.jpg" alt="Artwork 3">
      <div class="gallery-overlay"><div class="gallery-title">Easel Alignment</div></div>
    </div>
    <div class="gallery-item fade-up">
      <img src="images/coffee-watercolor.jpg" alt="Artwork 4">
      <div class="gallery-overlay"><div class="gallery-title">Earthy Textures</div></div>
    </div>
    <div class="gallery-item fade-up">
      <img src="images/golden-hour.jpg" alt="Artwork 5">
      <div class="gallery-overlay"><div class="gallery-title">Friday Sunset Session</div></div>
    </div>
  </div>
</main>

<footer class="footer">
  &copy; 2026 Artemis Art Studio. All rights reserved.
</footer>

<script>
(function(){
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) { entry.target.classList.add('visible'); }
    });
  }, { threshold: 0.05 });
  document.querySelectorAll('.fade-up').forEach(el => observer.observe(el));
})();
</script>
</body>
</html>
